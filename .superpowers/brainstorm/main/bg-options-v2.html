<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Background Options</title>
<style>
  html, body {
    margin: 0; padding: 0;
    width: 100%; height: 100%;
    background: #080808;
    overflow: hidden;
    font-family: system-ui, sans-serif;
    color: #fff;
  }
  #c {
    display: block;
    position: absolute;
    top: 0; left: 0;
  }
  #overlay {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    pointer-events: none;
    z-index: 2;
  }
  #hero {
    text-align: center;
    line-height: 1;
  }
  #hero .name {
    font-size: 72px;
    font-weight: 900;
    letter-spacing: -4px;
    color: #ffffff;
    line-height: 0.9;
  }
  #hero .sub {
    margin-top: 14px;
    font-size: 11px;
    letter-spacing: 5px;
    color: rgba(255,255,255,0.3);
    font-family: 'Courier New', monospace;
  }
  #tabs {
    position: absolute;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 10px;
    z-index: 3;
    pointer-events: all;
  }
  .tab {
    padding: 8px 20px;
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 4px;
    background: rgba(0,0,0,0.7);
    color: rgba(255,255,255,0.45);
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    cursor: pointer;
    font-family: 'Courier New', monospace;
    transition: all 0.2s;
  }
  .tab:hover { border-color: rgba(255,215,0,0.5); color: #ffd700; }
  .tab.on { border-color: #ffd700; color: #ffd700; background: rgba(255,215,0,0.08); }
  #mode-label {
    position: absolute;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 10px;
    letter-spacing: 4px;
    color: rgba(255,255,255,0.3);
    font-family: 'Courier New', monospace;
    z-index: 3;
    text-align: center;
  }
  #tip {
    position: absolute;
    top: 40px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 9px;
    letter-spacing: 3px;
    color: rgba(255,215,0,0.3);
    font-family: 'Courier New', monospace;
    z-index: 3;
  }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="overlay">
  <div id="hero">
    <div class="name">AYO<br>MORAKINYO</div>
    <div class="sub">FOUNDER · BUILDER · ATLANTA</div>
  </div>
</div>
<div id="mode-label">A — SPARSE PARTICLES</div>
<div id="tip">MOVE CURSOR OVER CANVAS</div>
<div id="tabs">
  <div class="tab on" onclick="setMode('particles',this)">A — Particles</div>
  <div class="tab" onclick="setMode('grain',this)">B — Grain</div>
  <div class="tab" onclick="setMode('both',this)">C — Both</div>
</div>

<script>
const canvas = document.getElementById('c')
const ctx = canvas.getContext('2d')

let W = canvas.width  = window.innerWidth  || 1200
let H = canvas.height = window.innerHeight || 800

window.addEventListener('resize', () => {
  W = canvas.width  = window.innerWidth
  H = canvas.height = window.innerHeight
  buildGrainFrames()
})

// ── mouse ──────────────────────────────────────────────────────────
let mx = W * 0.5, my = H * 0.5
window.addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY })

// ── mode ───────────────────────────────────────────────────────────
let mode = 'particles'
function setMode(m, el) {
  mode = m
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('on'))
  el.classList.add('on')
  const names = { particles:'A — SPARSE PARTICLES', grain:'B — FILM GRAIN / NOISE', both:'C — BOTH LAYERED' }
  document.getElementById('mode-label').textContent = names[m]
}

// ── particles ──────────────────────────────────────────────────────
const N = 90
const pts = []
for (let i = 0; i < N; i++) {
  pts.push({
    x:  Math.random() * 1400,
    y:  Math.random() * 900,
    vx: (Math.random() - 0.5) * 0.5,
    vy: (Math.random() - 0.5) * 0.5,
    r:  Math.random() * 2 + 0.8,
    gold: Math.random() < 0.3,
  })
}

function drawParticles() {
  for (const p of pts) {
    // cursor pull
    const dx = mx - p.x, dy = my - p.y
    const d  = Math.sqrt(dx*dx + dy*dy)
    if (d < 200) {
      const f = (200 - d) / 200 * 0.6
      p.vx += dx * f * 0.0008
      p.vy += dy * f * 0.0008
    }
    // dampen + drift
    p.vx *= 0.98; p.vy *= 0.98
    p.x  += p.vx; p.y  += p.vy
    // wrap
    if (p.x < 0) p.x = W; if (p.x > W) p.x = 0
    if (p.y < 0) p.y = H; if (p.y > H) p.y = 0

    // dot
    ctx.beginPath()
    ctx.arc(p.x, p.y, p.r, 0, Math.PI*2)
    ctx.fillStyle = p.gold ? 'rgba(255,215,0,0.75)' : 'rgba(255,255,255,0.55)'
    ctx.fill()

    // connections
    for (const q of pts) {
      if (q === p) continue
      const dx2 = p.x - q.x, dy2 = p.y - q.y
      const d2  = Math.sqrt(dx2*dx2 + dy2*dy2)
      if (d2 < 110) {
        ctx.beginPath()
        ctx.moveTo(p.x, p.y)
        ctx.lineTo(q.x, q.y)
        const a = (1 - d2/110) * 0.25
        ctx.strokeStyle = (p.gold || q.gold) ? `rgba(255,215,0,${a})` : `rgba(255,255,255,${a})`
        ctx.lineWidth = 0.8
        ctx.stroke()
      }
    }
  }

  // cursor glow
  const g = ctx.createRadialGradient(mx, my, 0, mx, my, 140)
  g.addColorStop(0, 'rgba(255,215,0,0.07)')
  g.addColorStop(1, 'transparent')
  ctx.fillStyle = g
  ctx.fillRect(0, 0, W, H)
}

// ── grain ──────────────────────────────────────────────────────────
let grainFrames = [], gf = 0
function buildGrainFrames() {
  grainFrames = []
  for (let f = 0; f < 6; f++) {
    const off = document.createElement('canvas')
    off.width = W; off.height = H
    const c2  = off.getContext('2d')
    const id  = c2.createImageData(W, H)
    const d   = id.data
    for (let i = 0; i < d.length; i += 4) {
      const v = Math.random() * 255 | 0
      d[i] = d[i+1] = d[i+2] = v
      d[i+3] = (Math.random() * 55 + 12) | 0
    }
    c2.putImageData(id, 0, 0)
    grainFrames.push(off)
  }
}
buildGrainFrames()

function drawGrain(t) {
  gf = Math.floor(t / 50) % grainFrames.length
  if (!grainFrames[gf]) return
  ctx.globalAlpha = 0.45
  ctx.globalCompositeOperation = 'screen'
  ctx.drawImage(grainFrames[gf], 0, 0)
  ctx.globalAlpha = 1
  ctx.globalCompositeOperation = 'source-over'

  // vignette
  const vig = ctx.createRadialGradient(W/2,H/2, H*0.08, W/2,H/2, H*0.85)
  vig.addColorStop(0, 'transparent')
  vig.addColorStop(1, 'rgba(0,0,0,0.65)')
  ctx.fillStyle = vig
  ctx.fillRect(0,0,W,H)
}

// ── loop ───────────────────────────────────────────────────────────
function loop(t) {
  ctx.fillStyle = '#080808'
  ctx.fillRect(0, 0, W, H)

  if (mode === 'particles' || mode === 'both') drawParticles()
  if (mode === 'grain'     || mode === 'both') drawGrain(t)

  requestAnimationFrame(loop)
}
requestAnimationFrame(loop)
</script>
</body>
</html>
